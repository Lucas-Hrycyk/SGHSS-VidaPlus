<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Administrador - SGHSS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">Painel do Administrador</a>
            <button class="btn btn-danger" onclick="logoutUser()">Sair</button>
        </div>
    </nav>
    <div class="container mt-5">
        <h3 id="welcome-message"></h3>
        <h4 class="mt-4">Gestão de Usuários</h4>
        <table class="table table-striped">
            <thead>
                <tr><th>Email</th><th>Perfil</th></tr>
            </thead>
            <tbody id="users-table-body"></tbody>
        </table>
    </div>

    <script src="../assets/js/auth.js"></script>
    <script>
        protectPage(['admin']);
        const currentUser = getCurrentUser();
        document.getElementById('welcome-message').innerText = `Bem-vindo(a), Admin ${currentUser.email}!`;

        const usersTableBody = document.getElementById('users-table-body');
        const allUsers = JSON.parse(localStorage.getItem('sghss_users')) || [];

        allUsers.forEach(user => {
            usersTableBody.innerHTML += `
                <tr>
                    <td>${user.email}</td>
                    <td><span class="badge bg-dark">${user.role}</span></td>
                </tr>`;
        });
    </script>
</body>
</html>
