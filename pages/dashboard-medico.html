<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Médico - SGHSS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-info shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">Painel do Médico</a>
            <button class="btn btn-danger" onclick="logoutUser()">Sair</button>
        </div>
    </nav>
    <div class="container mt-5">
        <h3 id="welcome-message"></h3>
        <h4 class="mt-4">Agenda de Pacientes</h4>
        <div id="appointments-list" class="list-group"></div>
    </div>

    <script src="../assets/js/auth.js"></script>
    <script src="../asstes/js/database.js"></script>
    <script>
        protectPage(['medico']);
        const currentUser = getCurrentUser();
        document.getElementById('welcome-message').innerText = `Bem-vindo(a), Dr(a). ${currentUser.email}!`;

        const appointmentsList = document.getElementById('appointments-list');
        const allAppointments = getAppointments();

        if (allAppointments.length === 0) {
            appointmentsList.innerHTML = '<p class="text-muted">Nenhuma consulta agendada no sistema.</p>';
        } else {
            allAppointments.forEach(app => {
                appointmentsList.innerHTML += `
                    <div class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            <strong>${new Date(app.date).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})}</strong>
                            - ${app.patientEmail} (${app.specialty})
                        </div>
                        <a href="prontuario.html?paciente=${app.patientEmail}" class="btn btn-primary btn-sm">Acessar Prontuário</a>
                    </div>`;
            });
        }
    </script>
</body>
</html>
