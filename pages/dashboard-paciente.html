<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Paciente - SGHSS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">Painel do Paciente</a>
            <button class="btn btn-danger" onclick="logoutUser()">Sair</button>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 id="welcome-message"></h3>
            <a href="agendamento.html" class="btn btn-success">Agendar Nova Consulta</a>
        </div>
        <h4>Minhas Consultas</h4>
        <div id="appointments-list" class="row"></div>
    </div>

    <script src="../assets/js/database.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        protectPage(['paciente']); 
        const currentUser = getCurrentUser();
        document.getElementById('welcome-message').innerText = `Bem-vindo(a), ${currentUser.email}!`;
        
        const appointmentsList = document.getElementById('appointments-list');
        const myAppointments = getAppointments().filter(app => app.patientEmail === currentUser.email);

        if (myAppointments.length === 0) {
            appointmentsList.innerHTML = '<p class="text-muted">Você não tem consultas agendadas.</p>';
        } else {
            myAppointments.forEach(app => {
                appointmentsList.innerHTML += `
                    <div class="col-md-6 mb-3">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">${app.specialty}</h5>
                                <p class="card-text">Data: ${new Date(app.date).toLocaleString('pt-BR')}</p>
                                <a href="prontuario.html?paciente=${app.patientEmail}" class="btn btn-info btn-sm">Ver Prontuário</a>
                            </div>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
